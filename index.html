<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>кешіреснба мені  ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: pink;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: red;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #yes {
            background: green;
            color: white;
        }

        #no {
            background: red;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>❤️ кешірші пажалуйста  ❤️</h1>
    <p>отінем ия басшы?</p>

    <button id="yes" onclick="forgive()">ия❤️</button>
    <button id="no">жоқ</button>

    <script>
        const noBtn = document.getElementById("no");

        noBtn.addEventListener("mouseover", () => {
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
            noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
        });

        function forgive() {
            document.body.innerHTML =
                "<h1>🥰 рақмет  ❤️</h1>";
        }
    </script>

</body>
</html>
